<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/loadingscreen.css">
    <title>Meesterschap | Diego Ramon</title>
    <link rel="icon" type="image/x-icon" href="./assets/img/Sattelite_Image.png">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

    <div id="loadingScreen">
        <div class="sun"></div>
        <div class="orbit-earth">
            <div class="earth">
                <div class="orbit-moon">
                    <div class="moon"></div>
                </div>
            </div>
        </div>
        <p>Information Loading...</p>
    </div>

    <nav id="titleSelector">
        <ul>
            <li><button onclick="filterByEvent('Weekly Nerd')">Weekly Nerd</button></li>
            <li><button onclick="filterByEvent('Meesterschap')">Meesterschap</button></li>
            <li><button onclick="filterByEvent('Weekly Geek')">Weekly Geek</button></li>
            <li><button onclick="filterByEvent('Vakken')">Vakken</button></li>
            <li><button onclick="filterByEvent('Meesterproef')">Meesterproef</button></li>
        </ul>
    </nav>

    <div id="selector-container">
        <ul id="selector-list">
        </ul>
    </div>

    <div id="details-container">
        <button onclick="resetFocus()">← Terug naar overzicht</button>
        <div id="details-content">
        </div>
    </div>

    <audio autoplay loop id="backgroundMusic">
        <source src="./assets/audio/spaceambience.mp3" type="audio/mpeg">
    </audio>

    <!-- Met behulp van Gemini een importmap gemaakt -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./js/3drenderer.js"></script>
    <script type="module" src="./js/nebula.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
